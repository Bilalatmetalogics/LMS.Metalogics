<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MetaLogics | Internal Training Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container": "#eeedf7",
                        "surface-container-highest": "#e3e1ec",
                        "inverse-primary": "#c3c0ff",
                        "on-tertiary-fixed": "#351000",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "primary-container": "#4f46e5",
                        "secondary": "#58579b",
                        "tertiary-fixed": "#ffdbcc",
                        "on-primary-fixed": "#0f0069",
                        "error-container": "#ffdad6",
                        "outline": "#777587",
                        "on-primary-container": "#dad7ff",
                        "tertiary": "#7e3000",
                        "surface-tint": "#4d44e3",
                        "tertiary-fixed-dim": "#ffb695",
                        "on-secondary-container": "#454386",
                        "tertiary-container": "#a44100",
                        "surface-variant": "#e3e1ec",
                        "inverse-on-surface": "#f1effa",
                        "surface-container-high": "#e8e7f1",
                        "on-secondary-fixed": "#140f54",
                        "primary": "#3525cd",
                        "inverse-surface": "#2f3038",
                        "surface": "#fbf8ff",
                        "outline-variant": "#c7c4d8",
                        "surface-container-low": "#f4f2fd",
                        "on-surface": "#1a1b22",
                        "on-secondary-fixed-variant": "#413f82",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#c3c0ff",
                        "secondary-fixed-dim": "#c3c0ff",
                        "background": "#fbf8ff",
                        "on-primary-fixed-variant": "#3323cc",
                        "on-background": "#1a1b22",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#e2dfff",
                        "surface-bright": "#fbf8ff",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#e2dfff",
                        "on-surface-variant": "#464555",
                        "surface-dim": "#dad9e3",
                        "secondary-container": "#b6b4ff",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#ffd2be",
                        "on-error-container": "#93000a"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f2fd; /* surface-container-low per instruction to use zinc-50 style logic */
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
        }
        .signature-gradient {
            background: linear-gradient(135deg, #3525cd 0%, #4f46e5 100%);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 antialiased selection:bg-primary-container selection:text-white">
<!-- Login Container -->
<main class="w-full max-w-[440px] flex flex-col gap-8">
<!-- Auth Card -->
<section class="bg-surface-container-lowest rounded-xl p-10 shadow-[0_32px_64px_-12px_rgba(53,37,205,0.06)] border border-outline-variant/15">
<!-- Header Section -->
<header class="flex flex-col items-center text-center mb-10">
<div class="mb-8 w-16 h-16 rounded-2xl flex items-center justify-center bg-surface-container-high overflow-hidden">
<img alt="MetaLogics Logo" class="w-12 h-12 object-contain" data-alt="Modern abstract corporate logo for a technology company featuring geometric shapes in deep indigo and vibrant violet tones on a clean white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBjNDxmHjag51F_sbsUjddVPUuofmILe432KcZ75KI0Qhulta-aULoCUiYjXVXfl9XDzQPbQUmiv9skvTOwuLt5NwuUxydwF-Rpz-qq4hmaU8Ox7bcONNNYWYOvDtCuHMyzyqWuViJ5oc0-eJbeuXAoJK8xeFTSMcrkk_aQnY8giLeg6qhnqdrpo8kwIxc22O6Uu7EOOCrXnfo-THvOA_GZ08eYje6as4f7ilFkZ1Y7VH5CFCN2nbZksstdppIrniKQamf1uu5R-LA"/>
</div>
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface mb-2 font-headline">Internal Training</h1>
<p class="text-on-surface-variant text-sm font-medium">Sign in to your account</p>
</header>
<!-- Error State -->
<div class="mb-8 p-4 bg-error-container/50 border border-error/20 rounded-lg flex items-center gap-3 animate-in fade-in slide-in-from-top-4">
<span class="material-symbols-outlined text-error text-[20px]">report</span>
<p class="text-on-error-container text-xs font-semibold">Invalid credentials. Please check your email or password.</p>
</div>
<!-- Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] transition-colors group-focus-within:text-primary">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border border-zinc-200 rounded-lg text-sm font-medium text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary-container/20 focus:border-primary transition-all outline-none" id="email" placeholder="admin@metalogics.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="text-[11px] font-bold text-primary hover:text-primary-container transition-colors" href="#">FORGOT?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px] transition-colors group-focus-within:text-primary">lock</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border border-zinc-200 rounded-lg text-sm font-medium text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary-container/20 focus:border-primary transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center gap-2 ml-1">
<input class="w-4 h-4 rounded border-zinc-300 text-primary-container focus:ring-primary-container cursor-pointer" id="remember" type="checkbox"/>
<label class="text-xs font-medium text-on-surface-variant select-none cursor-pointer" for="remember">Stay signed in for 30 days</label>
</div>
<button class="w-full py-4 px-6 signature-gradient text-white rounded-lg font-bold text-sm shadow-lg shadow-primary-container/25 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Sign in
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
</section>
<!-- Demo Accounts Panel -->
<section class="flex flex-col gap-4">
<div class="flex items-center gap-4 px-2">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-[10px] font-black uppercase tracking-[0.2em] text-outline">Quick Access (Demo)</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<div class="grid grid-cols-1 gap-2">
<!-- Admin Row -->
<button class="group flex items-center justify-between p-4 bg-white/40 hover:bg-white border border-outline-variant/10 rounded-xl transition-all hover:shadow-md">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shield_person</span>
</div>
<div class="text-left">
<p class="text-xs font-bold text-on-surface">Admin Portal</p>
<p class="text-[11px] text-on-surface-variant font-medium">admin@metalogics.com</p>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors text-[20px]">login</span>
</button>
<!-- Instructor Row -->
<button class="group flex items-center justify-between p-4 bg-white/40 hover:bg-white border border-outline-variant/10 rounded-xl transition-all hover:shadow-md">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-tertiary-container/10 flex items-center justify-center text-tertiary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<div class="text-left">
<p class="text-xs font-bold text-on-surface">Instructor View</p>
<p class="text-[11px] text-on-surface-variant font-medium">instructor@metalogics.com</p>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-tertiary-container transition-colors text-[20px]">login</span>
</button>
<!-- Student Row -->
<button class="group flex items-center justify-between p-4 bg-white/40 hover:bg-white border border-outline-variant/10 rounded-xl transition-all hover:shadow-md">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-secondary-container/20 flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<div class="text-left">
<p class="text-xs font-bold text-on-surface">Learner Access</p>
<p class="text-[11px] text-on-surface-variant font-medium">student@metalogics.com</p>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-secondary transition-colors text-[20px]">login</span>
</button>
</div>
</section>
<!-- Footer -->
<footer class="mt-4 flex justify-center gap-6">
<a class="text-[11px] font-semibold text-outline hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<a class="text-[11px] font-semibold text-outline hover:text-on-surface transition-colors" href="#">System Status</a>
<a class="text-[11px] font-semibold text-outline hover:text-on-surface transition-colors" href="#">Support</a>
</footer>
</main>
<!-- Decorative Elements (Asymmetric layout principle) -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full -z-10"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-tertiary/5 blur-[120px] rounded-full -z-10"></div>
</body></html>
